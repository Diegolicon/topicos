# DataSource Quarkus - H2 (In-Memory)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:airsoft
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."Topicos".level=DEBUG

# JWT (Legacy - para retrocompatibilidade)
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.new-token.signature-algorithm=RS256
mp.jwt.verify.issuer=https://example.com/issuer

# ============================================
# JWT and CORS Configuration
# ============================================
# Você pode ajustar o token e os cabeçalhos CORS abaixo.

quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,HEAD,OPTIONS,PUT,DELETE,POST,PATCH
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.credentials=true
quarkus.http.cors.max-age=86400

# Timeout de token (em segundos)
# quarkus.smallrye.jwt.new-token.expiration=3600s

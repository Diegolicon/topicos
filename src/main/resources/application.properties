# DataSource Quarkus
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/airsoft

# Hibernate
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."Topicos".level=DEBUG

# JWT
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.new-token.signature-algorithm=RS256
mp.jwt.verify.issuer=https://example.com/issuer

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,HEAD,OPTIONS,PUT,DELETE,POST,PATCH
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.credentials=true
quarkus.http.cors.max-age=86400

# SMTP. Configure essas variaveis antes de iniciar a API.
quarkus.mailer.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
quarkus.mailer.port=${MAIL_PORT:2525}
quarkus.mailer.username=${MAIL_USERNAME:}
quarkus.mailer.password=${MAIL_PASSWORD:}
quarkus.mailer.from=${MAIL_FROM:no-reply@airsoft.local}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.mock=${MAIL_MOCK:false}
